# ================================================================
#  Dashboard Serre v3 — Mushroom + Bubble + Mini Graph
# ================================================================

type: vertical-stack
cards:

  # ── HEADER ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: 🌿 Serre 6×3 — Arrosage automatique

  # ── CHIPS STATUS ──────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: template
        content: "{{ states('sensor.arduino_serre_esp_status') | upper }}"
        icon: mdi:chip
        icon_color: >
          {{ 'green' if states('sensor.arduino_serre_esp_status') == 'online'
             else 'red' }}

      - type: template
        content: "{{ states('sensor.arduino_serre_heure_rtc') }}"
        icon: mdi:clock-outline
        icon_color: blue

      - type: template
        content: "{{ states('sensor.arduino_serre_source_heure') }}"
        icon: >
          {{ 'mdi:web' if states('sensor.arduino_serre_source_heure') == 'NTP'
             else 'mdi:chip' }}
        icon_color: teal

      - type: template
        content: "{{ states('sensor.serre_tunel_arduino_serre_temperature_ds3231') | float(0) | round(1) }}°C"
        icon: mdi:thermometer-lines
        icon_color: >
          {% set t = states('sensor.serre_tunel_arduino_serre_temperature_ds3231') | float(0) %}
          {{ 'red' if t > 30 else 'orange' if t > 25 else 'green' }}

  # ── TEMPÉRATURE + ÉLECTROVANNE ────────────────────────────────
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: >
          {{ states('sensor.arduino_serre_temperature') | float(0) | round(1) }}°C
        secondary: Température serre
        icon: mdi:thermometer
        icon_color: >
          {% set t = states('sensor.arduino_serre_temperature') | float(0) %}
          {{ 'red' if t > 30 else 'orange' if t > 25 else 'green' }}
        badge_icon: >
          {{ 'mdi:alert' if states('sensor.arduino_serre_temperature') | float(0) > 30 else '' }}
        badge_color: red

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_relais') }}"
        secondary: Électrovanne
        icon: >
          {{ 'mdi:water' if states('sensor.arduino_serre_relais') == 'ON'
             else 'mdi:water-off' }}
        icon_color: >
          {{ 'blue' if states('sensor.arduino_serre_relais') == 'ON'
             else 'disabled' }}

  # ── GRAPHIQUE TEMPÉRATURE 24H ──────────────────────────────────
  - type: custom:mini-graph-card
    name: Température — 24 dernières heures
    entities:
      - entity: sensor.arduino_serre_temperature
        name: Serre
    hours_to_show: 24
    points_per_hour: 4
    line_width: 2
    smoothing: true
    show:
      labels: true
      points: false
      legend: false
      fill: fade
    color_thresholds:
      - value: 0
        color: "#42a5f5"
      - value: 25
        color: "#ffa726"
      - value: 30
        color: "#ef5350"

  # ── ÉTAT ARROSAGES ────────────────────────────────────────────
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: >
          {{ 'Effectué ✓' if states('sensor.arduino_serre_arrosage_matin_fait') == 'true'
             else 'En attente' }}
        secondary: Arrosage 9h00
        icon: mdi:weather-sunset-up
        icon_color: >
          {{ 'green' if states('sensor.arduino_serre_arrosage_matin_fait') == 'true'
             else 'orange' }}

      - type: custom:mushroom-template-card
        primary: >
          {{ 'Cooldown 30min' if states('sensor.arduino_serre_cooldown_actif') == 'true'
             else 'Prêt' }}
        secondary: Arrosage temp.
        icon: >
          {{ 'mdi:timer-sand' if states('sensor.arduino_serre_cooldown_actif') == 'true'
             else 'mdi:timer-check-outline' }}
        icon_color: >
          {{ 'orange' if states('sensor.arduino_serre_cooldown_actif') == 'true'
             else 'green' }}

  # ── CONTRÔLE MANUEL ───────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Contrôle manuel

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: 2 min
        secondary: Arrosage court
        icon: mdi:water-outline
        icon_color: blue
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.arduino_serre_arrosage_court_2min

      - type: custom:mushroom-template-card
        primary: 15 min
        secondary: Arrosage long
        icon: mdi:water
        icon_color: blue
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.arduino_serre_arrosage_long_15min

      - type: custom:mushroom-template-card
        primary: Stop
        secondary: Arrêt immédiat
        icon: mdi:water-off
        icon_color: red
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.arduino_serre_arret_arrosage

  # ── DÉBITMÈTRES ───────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: 💧 Compteurs eau

  # Débit temps réel
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_debit_maison') }} L/min"
        secondary: Débit maison
        icon: mdi:water-pump
        icon_color: >
          {% set f = states('sensor.arduino_serre_debit_maison') | float(0) %}
          {{ 'red' if f > 25 else 'blue' if f > 0.5 else 'disabled' }}
        badge_icon: >
          {{ 'mdi:alert' if states('sensor.arduino_serre_debit_maison') | float(0) > 25 else '' }}
        badge_color: red

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_debit_chevaux') }} L/min"
        secondary: Débit chevaux
        icon: mdi:horse
        icon_color: >
          {% set f = states('sensor.arduino_serre_debit_chevaux') | float(0) %}
          {{ 'red' if f > 25 else 'blue' if f > 0.5 else 'disabled' }}
        badge_icon: >
          {{ 'mdi:alert' if states('sensor.arduino_serre_debit_chevaux') | float(0) > 25 else '' }}
        badge_color: red

  # Graphique débit temps réel
  - type: custom:mini-graph-card
    name: Débit — 1 heure
    entities:
      - entity: sensor.arduino_serre_debit_maison
        name: Maison
        color: "#1565C0"
      - entity: sensor.arduino_serre_debit_chevaux
        name: Chevaux
        color: "#2e7d32"
    hours_to_show: 1
    points_per_hour: 12
    line_width: 2
    smoothing: false
    show:
      labels: true
      points: false
      legend: true
      fill: false

  # Cycle en cours
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_cycle_maison') }} L"
        secondary: Cycle maison
        icon: mdi:counter
        icon_color: blue

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_cycle_chevaux') }} L"
        secondary: Cycle chevaux
        icon: mdi:counter
        icon_color: green

  # Journalier + Total
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_journalier_maison') }} L"
        secondary: Aujourd'hui maison
        icon: mdi:calendar-today
        icon_color: blue

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_journalier_chevaux') }} L"
        secondary: Aujourd'hui chevaux
        icon: mdi:calendar-today
        icon_color: green

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_total_maison') }} L"
        secondary: Total maison
        icon: mdi:water-boiler
        icon_color: blue

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.arduino_serre_total_chevaux') }} L"
        secondary: Total chevaux
        icon: mdi:water-boiler
        icon_color: green

  # Alerte débit
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.arduino_serre_alerte_debit') }}"
    secondary: Dernière alerte
    icon: mdi:alert-circle-outline
    icon_color: >
      {{ 'red' if states('sensor.arduino_serre_alerte_debit') not in ['unknown','unavailable',''] else 'disabled' }}
