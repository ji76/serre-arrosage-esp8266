# ================================================================
#  Package HA — Serre Arrosage
#  /config/packages/serre.yaml
# ================================================================

mqtt:
  sensor:
    - name: "Relais"
      state_topic: "serre/arrosage/relay"
      unique_id: serre_relay
      device: &serre_device
        identifiers: ["arduino_serre"]
        name: "Arduino Serre"
        model: "ESP8266 Arrosage v1.2"
        manufacturer: "DIY"

    - name: "Température"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.temp_c }}"
      unit_of_measurement: "°C"
      device_class: temperature
      unique_id: serre_temp
      device: *serre_device

    - name: "Heure RTC"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.time }}"
      unique_id: serre_time
      device: *serre_device

    - name: "Source Heure"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.time_source }}"
      unique_id: serre_time_source
      device: *serre_device

    - name: "Arrosage Matin Fait"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.morning_done }}"
      unique_id: serre_morning
      device: *serre_device

    - name: "Cooldown Actif"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.temp_cooldown }}"
      unique_id: serre_cooldown
      device: *serre_device

    - name: "ESP Status"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.status }}"
      unique_id: serre_status
      device: *serre_device

    - name: "IP ESP"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.ip }}"
      unique_id: serre_ip
      device: *serre_device


    - name: "Température DS3231"
      state_topic: "serre/arrosage/status"
      value_template: "{{ value_json.rtc_temp_c }}"
      unit_of_measurement: "°C"
      device_class: temperature
      unique_id: serre_rtc_temp
      icon: mdi:thermometer-check
      device: *serre_device
  button:
    - name: "Arrosage Court 2min"
      command_topic: "serre/arrosage/cmd"
      payload_press: "ON_TEMP"
      unique_id: serre_btn_short
      icon: mdi:water-outline
      device: *serre_device

    - name: "Arrosage Long 15min"
      command_topic: "serre/arrosage/cmd"
      payload_press: "ON_FULL"
      unique_id: serre_btn_long
      icon: mdi:water
      device: *serre_device

    - name: "Arrêt Arrosage"
      command_topic: "serre/arrosage/cmd"
      payload_press: "OFF"
      unique_id: serre_btn_off
      icon: mdi:water-off
      device: *serre_device

    - name: "Reset Arrosage Matin"
      command_topic: "serre/arrosage/cmd"
      payload_press: "RESET_MORNING"
      unique_id: serre_btn_reset
      icon: mdi:restart
      device: *serre_device

# ================================================================
#  AUTOMATIONS
# ================================================================
automation:
  - id: serre_esp_offline_alert
    alias: "Serre — ESP hors ligne"
    trigger:
      - platform: state
        entity_id: sensor.arduino_serre_esp_status
        to: "offline"
        for:
          minutes: 5
    action:
      - service: notify.mobile_app_iphone_jer
        data:
          title: "🌿 Serre Arrosage"
          message: "⚠️ L'ESP de la serre est hors ligne depuis 5 min !"

  - id: serre_arrosage_notif
    alias: "Serre — Notification arrosage"
    trigger:
      - platform: state
        entity_id: sensor.arduino_serre_relais
        to: "ON"
    action:
      - service: notify.mobile_app_iphone_jer
        data:
          title: "🌿 Serre — Arrosage"
          message: >
            Arrosage démarré ({{ states('sensor.arduino_serre_source_heure') }}).
            Temp : {{ states('sensor.arduino_serre_temperature') }}°C

  # ── Capteurs débit ──────────────────────────────────────────────
    - name: "Débit Maison"
      state_topic: "serre/debit/maison"
      value_template: "{{ value_json.flow_lpm | round(2) }}"
      unit_of_measurement: "L/min"
      unique_id: serre_flow_maison
      icon: mdi:water-pump
      device: *serre_device

    - name: "Cycle Maison"
      state_topic: "serre/debit/maison"
      value_template: "{{ value_json.cycle_l | round(2) }}"
      unit_of_measurement: "L"
      unique_id: serre_cycle_maison
      icon: mdi:counter
      device: *serre_device

    - name: "Journalier Maison"
      state_topic: "serre/debit/maison"
      value_template: "{{ value_json.daily_l | round(1) }}"
      unit_of_measurement: "L"
      unique_id: serre_daily_maison
      icon: mdi:calendar-today
      device: *serre_device

    - name: "Total Maison"
      state_topic: "serre/debit/maison"
      value_template: "{{ value_json.total_l | round(1) }}"
      unit_of_measurement: "L"
      unique_id: serre_total_maison
      icon: mdi:water-boiler
      device: *serre_device

    - name: "Débit Chevaux"
      state_topic: "serre/debit/chevaux"
      value_template: "{{ value_json.flow_lpm | round(2) }}"
      unit_of_measurement: "L/min"
      unique_id: serre_flow_chevaux
      icon: mdi:horse
      device: *serre_device

    - name: "Cycle Chevaux"
      state_topic: "serre/debit/chevaux"
      value_template: "{{ value_json.cycle_l | round(2) }}"
      unit_of_measurement: "L"
      unique_id: serre_cycle_chevaux
      icon: mdi:counter
      device: *serre_device

    - name: "Journalier Chevaux"
      state_topic: "serre/debit/chevaux"
      value_template: "{{ value_json.daily_l | round(1) }}"
      unit_of_measurement: "L"
      unique_id: serre_daily_chevaux
      icon: mdi:calendar-today
      device: *serre_device

    - name: "Total Chevaux"
      state_topic: "serre/debit/chevaux"
      value_template: "{{ value_json.total_l | round(1) }}"
      unit_of_measurement: "L"
      unique_id: serre_total_chevaux
      icon: mdi:water-boiler
      device: *serre_device

    - name: "Alerte Débit"
      state_topic: "serre/debit/alerte"
      unique_id: serre_flow_alert
      icon: mdi:alert
      device: *serre_device

  # ── Automation alerte débit ──────────────────────────────────────
  - id: serre_flow_alert
    alias: "Serre — Alerte débit anormal"
    trigger:
      - platform: state
        entity_id: sensor.arduino_serre_alerte_debit
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"
    action:
      - service: notify.mobile_app_iphone_jer
        data:
          title: "💧 Serre — Alerte Eau"
          message: "{{ states('sensor.arduino_serre_alerte_debit') }}"
